name: "▶️ Gemini Invoke"

on:
  workflow_call:
    inputs:
      additional_context:
        type: "string"
        description: "Any additional context from the request"
        required: false
      gemini_api_key:
        type: "string"
        description: "Gemini API key"
        required: true
      github-token:
        type: "string"
        description: "Caller's github token"
        required: true
      mise_env:
        type: string
        description: Optional Mise environment name
        required: false
      gemini_debug:
        type: string
        required: false
      trust_workspace:
        type: boolean
        default: true
      app_id:
        type: string
        required: false
      app_private_key:
        type: string
        required: false

concurrency:
  group: "${{ github.workflow }}-plan-execute-${{ github.event_name }}-${{
    github.event.pull_request.number || github.event.issue.number }}"
  cancel-in-progress: true

defaults:
  run:
    shell: "bash"

env:
  # this is set to true in repository settings, but we default to false here to make it easier to turn off
  GEMINI_CLI_TRUST_WORKSPACE: ${{ inputs.trust_workspace || vars.GEMINI_CLI_TRUST_WORKSPACE || 'false' }}

jobs:
  invoke:
    timeout-minutes: 45
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"

    steps:
      - name: "Mint identity token"
        id: "mint_identity_token"
        if: |-
          ${{ inputs.app_id || vars.APP_ID }}
        uses: "actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3"
        with:
          client-id: "${{ inputs.app_id || vars.APP_ID }}"
          private-key: "${{ inputs.app_private_key || secrets.APP_PRIVATE_KEY }}"
          permission-contents: "write"
          permission-issues: "write"
          permission-pull-requests: "write"

      - name: "Checkout Code"
        uses: "actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98"

      - name: "Run Gemini CLI"
        id: "run_gemini"
        uses: >-
          google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489
        env:
          TITLE: "${{ github.event.pull_request.title || github.event.issue.title }}"
          DESCRIPTION: "${{ github.event.pull_request.body || github.event.issue.body }}"
          EVENT_NAME: "${{ github.event_name }}"
          GITHUB_TOKEN: "${{ steps.mint_identity_token.outputs.token ||
            inputs.github-token || secrets.GITHUB_TOKEN || github.token }}"
          IS_PULL_REQUEST: "${{ !!github.event.pull_request }}"
          ISSUE_NUMBER: "${{ github.event.pull_request.number || github.event.issue.number
            }}"
          REPOSITORY: "${{ github.repository }}"
          ADDITIONAL_CONTEXT: "${{ inputs.additional_context }}"
          GEMINI_CLI_TRUST_WORKSPACE: "${{ env.GEMINI_CLI_TRUST_WORKSPACE || inputs.trust_workspace }}"
          MISE_ENV: "${{ inputs.mise_env || vars.MISE_ENV }}"
        with:
          gemini_api_key: "${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY }}"
          gemini_debug: >-
            "${{ fromJSON(inputs.gemini_debug || vars.GEMINI_DEBUG ||
            vars.ACTIONS_STEP_DEBUG || 'false') }}"
          workflow_name: "gemini-invoke"
          # Assistant workflows can be triggered by comments on either Issues or PRs.
          # We explicitly map both fields so the CLI can correctly categorize the interaction.
          github_pr_number: "${{ github.event.pull_request.number }}"
          github_issue_number: "${{ github.event.issue.number }}"
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_issue_comment",
                    "issue_read",
                    "list_issues",
                    "search_issues",
                    "pull_request_read",
                    "list_pull_requests",
                    "search_pull_requests",
                    "get_commit",
                    "get_file_contents",
                    "list_commits",
                    "search_code"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: "/gemini-invoke"
